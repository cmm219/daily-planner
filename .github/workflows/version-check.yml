name: Version check

on:
  pull_request:
    branches:
      - main

jobs:
  version-uniqueness:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify VERSION uniqueness
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: ./scripts/check_version_unique.ps1
